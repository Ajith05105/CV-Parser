<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Builder — CV Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { color-scheme: dark; }
      body { font-family: "Inter", system-ui, sans-serif; }
      .font-mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .spin { animation: spin 1s linear infinite; }
      @keyframes pop { 0% { transform: scale(0); } 60% { transform: scale(1.15); } 100% { transform: scale(1); } }
      .pop { animation: pop 0.5s cubic-bezier(0.2, 0.8, 0.4, 1.2) both; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
      .draw { stroke-dasharray: 60; stroke-dashoffset: 60; animation: draw 0.6s 0.2s forwards ease-out; }
      .glow { box-shadow: 0 0 0 2px var(--glow), 0 0 24px -2px var(--glow); }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
